<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Motion Dashboard</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 flex overflow-hidden font-sans">
  
  <!-- Sidebar -->
  <aside class="w-80 bg-slate-950 border-r border-slate-800 flex flex-col h-screen z-10 shadow-2xl relative">
     <div class="p-6 border-b border-slate-800 bg-slate-900/50">
         <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 flex items-center gap-2">
            <svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Motion Builder
         </h1>
         <p class="text-xs text-slate-400 mt-2">Select a path or build your own.</p>
     </div>
     <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="menu">
         <!-- Menu items injected here by JS -->
     </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 h-screen flex flex-col relative bg-slate-900">
      
      <!-- Top Bar -->
      <header class="h-16 border-b border-slate-800 bg-slate-900/50 flex items-center px-8 justify-between shrink-0 z-20">
          <h2 id="current-title" class="text-lg font-semibold text-slate-200">1. Circle Loader 🟢</h2>
          
          <div class="flex gap-3">
              <button id="edit-custom-btn" class="hidden bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-1.5 rounded-lg text-sm transition-colors border border-slate-700">Edit SVG</button>
              <button id="toggle-code-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg text-sm transition-colors shadow-[0_0_10px_rgba(37,99,235,0.4)]">Show Code</button>
          </div>
      </header>

      <!-- Main Content Area -->
      <div class="flex-1 flex flex-col relative overflow-hidden bg-slate-800/30">
          
          <!-- Preview Area -->
          <div class="flex-1 flex items-center justify-center p-10 relative" id="preview-container">
              <!-- Rendered preview injected here -->
              <div id="preview" class="transform scale-[1.2] lg:scale-[1.5] transition-transform duration-500 flex items-center justify-center">
                  
              </div>
          </div>
          
          <!-- Custom Path Input Area -->
          <div id="custom-panel" class="bg-slate-800/95 border-t border-slate-700 hidden shrink-0 z-10 transition-all shadow-[0_-10px_30px_rgba(0,0,0,0.2)]">
              <div class="p-6">
                  <h3 class="text-lg font-semibold mb-2 text-blue-400 flex items-center gap-2">
                     <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                     Custom SVG Builder
                  </h3>
                  
                  <div class="mt-4">
                      <label class="block text-xs text-slate-400 mb-2">Paste Full SVG Code Here</label>
                      <textarea id="custom-svg-input" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-4 text-slate-200 font-mono text-sm h-32 outline-none focus:border-blue-500 transition-colors" placeholder='<svg viewBox="0 0 100 100">\n  <path d="M10,10 L90,90"></path>\n</svg>'></textarea>
                  </div>
                  
                  <div class="flex justify-end mt-4">
                      <button id="generate-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg font-medium transition-colors shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                          Generate & Animate
                      </button>
                  </div>
              </div>
          </div>
      </div>
      
      <!-- Code Panel (Hidden by default) -->
      <div id="code-panel" class="hidden flex-1 bg-slate-950 flex flex-col z-10">
          <div class="flex justify-between items-center px-8 py-4 border-b border-slate-800/50 bg-slate-900/50">
             <h3 class="font-mono text-sm text-slate-400 flex items-center gap-2">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                 Generated Code
             </h3>
             <button id="copy-btn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-lg text-sm transition-colors border border-slate-700 flex items-center gap-2 shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                <span id="copy-text">Copy HTML</span>
             </button>
          </div>
          <div class="flex-1 overflow-y-auto p-8">
             <pre><code id="code-output" class="text-blue-300 text-sm font-mono whitespace-pre-wrap"></code></pre>
          </div>
      </div>
  </main>
  
  <script src="main.js"></script>
</body>
</html>
